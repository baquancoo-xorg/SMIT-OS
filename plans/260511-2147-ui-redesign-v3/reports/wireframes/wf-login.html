<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #faf9fe;
        }
        .bento-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        .bento-card:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06);
        }
        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 88, 188, 0.15);
            border-color: #0058bc;
        }
        .apple-button {
            background: linear-gradient(180deg, #007aff 0%, #0058bc 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .apple-button:active {
            transform: scale(0.98);
            filter: brightness(0.95);
        }

<body class="min-h-screen flex flex-col justify-center items-center text-on-background p-margin-mobile md:p-margin-desktop">
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Bento Card Shell -->
<div class="bento-card rounded-xl p-card-padding flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-8 w-full flex flex-col items-center">
<img alt="SMIT-OS Logo" class="h-16 w-auto mb-4 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujNahqWISGJk8VU1WywStriAxkEJzabUH4SRhUFRKXu1ddwBq6XGLISZ-ZTavUptwnfhw5QkJfs4mj6QpcDLgmhM99XnePdltfAJsypdCEDpbcnhWIQDSmWV9qANQiGJEcDTyjtKzdwFWIA96mTW-1B_EkEH8O5t-xpuOAXutqfN1AGOdBBiEMGhmYGoH9cabaLJfqw0KG81nh3DelXzhZ5yOv0EhL4GwNES5vr_HfjylUzoVoqrWG08fE"/>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Executive Precision for Sales Operations</p>
</div>
<!-- Form Section -->
<form class="w-full space-y-stack-gap" onsubmit="return false;">
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md input-glow transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md input-glow transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex justify-end pt-1">
<a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Password Recovery</a>
</div>
<button class="apple-button w-full py-4 rounded-lg text-on-primary font-headline-md text-body-md font-semibold tracking-wide mt-4" type="submit">
                    Sign in
                </button>
</form>
<!-- Bottom Divider -->
<div class="w-full h-px bg-outline-variant/20 my-8"></div>
<!-- Secondary Actions -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Admin Contact</a>
</p>
</div>
</div>
<!-- Decorative Spatial Background Elements (Subtle) -->
<div class="fixed -z-10 top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-fixed-dim/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] bg-secondary-fixed-dim/20 blur-[120px] rounded-full"></div>
</div>
</main>
<!-- Footer Component -->
<footer class="fixed bottom-0 left-0 w-full py-8 px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto border-t border-outline-variant/30 bg-transparent">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary mb-4 md:mb-0">SMIT-OS</div>
<div class="flex flex-col md:flex-row items-center gap-6">
<div class="font-label-sm text-label-sm text-on-surface-variant opacity-70">
                © 2024 SMIT-OS Enterprise. Precision Engineered.
            </div>
<nav class="flex gap-4">
<a class="font-label-sm text-label-sm text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary transition-opacity" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary transition-opacity" href="#">System Status</a>
</nav>
</div>
