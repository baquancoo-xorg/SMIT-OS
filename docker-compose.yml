version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smit_os_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smitos_db
    ports:
      - "5435:5432"
    volumes:
      - /Users/dominium/Documents/database:/var/lib/postgresql/data

