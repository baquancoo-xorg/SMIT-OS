<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT OS - Sales Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .expand-transition { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease-in-out; }
        /* Tùy chỉnh icon calendar màu trắng trên nền tối */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 py-8 px-4 text-slate-800 min-h-screen">

    <div class="max-w-3xl mx-auto space-y-6" id="app-container">
        <!-- Render from JS -->
    </div>

    <script>
        // MOCK DATA: Đội Sales
        const currentUser = { name: 'Kim Huệ', role: 'Account Executive', avatar: 'KH' };
        
        const assignedTasks = [
            { id: 'SALE-401', title: 'Chăm sóc & Đàm phán Deal Nelly (500 Tỷ)' },
            { id: 'SALE-402', title: 'Follow-up KH dùng thử (Anh Minh 40 Tỷ)' },
            { id: 'SALE-405', title: 'Hunting KH mới trên diễn đàn BlackHatWorld' },
            { id: 'SALE-408', title: 'Gọi điện kịch bản xin Referral (Cu2Cu)' }
        ];

        let formData = {
            reportDate: '2026-04-14', 
            status: {}, 
            details: {}, // Lưu %, Note, Trạng thái Deal, Doanh thu, TicketType...
            
            blockers: [
                { id: 'b1', task: 'SALE-401 - Chăm sóc & Đàm phán Deal Nelly (500 Tỷ)', desc: 'Khách đã chốt mồm nhưng đang bắt phải có tính năng Quản lý Page mới chịu ký Hợp đồng. Cần Tech đẩy nhanh API gấp.', impact: 'high' }
            ],

            todayPlans: [
                { id: 'p1', task: 'SALE-401 - Chăm sóc & Đàm phán Deal Nelly (500 Tỷ)', output: 'Họp chốt lại timeline với Tech để phản hồi khách', progress: '90', isHot: true },
                { id: 'p2', task: 'SALE-405 - Hunting KH mới trên diễn đàn BlackHatWorld', output: 'Nhắn tin tiếp cận được 10 KH ngoại quốc', progress: '100', isHot: false }
            ]
        };

        function setTaskStatus(taskId, status) {
            if (formData.status[taskId] === status) {
                delete formData.status[taskId];
            } else {
                formData.status[taskId] = status;
                if(!formData.details[taskId]) {
                    // Thêm các trường dữ liệu Metrics mới cho Sale theo yêu cầu
                    formData.details[taskId] = { 
                        progress: 50, note: '', followupStatus: 'following', 
                        hasSaleMetrics: false, 
                        leadsReceived: '', huntingContacts: '',
                        leadsAttempted: '', leadsQualified: '', leadsUnqualified: '',
                        demosBooked: '', // Đề xuất 1: Số lịch Demo đã book
                        oppValue: '', revenue: '', 
                        ticketsResolved: '', ticketType: 'bug' // Đề xuất 3: Loại ticket support
                    };
                }
            }
            renderApp();
        }

        function updateDetail(taskId, field, value) {
            formData.details[taskId][field] = value;
            if(field === 'progress') {
                document.getElementById(`prog-val-${taskId}`).innerText = value + '%';
            }
        }

        function addBlocker() {
            formData.blockers.push({ id: 'b' + Date.now(), task: '', desc: '', impact: 'none' });
            renderApp();
        }

        function removeBlocker(id) {
            formData.blockers = formData.blockers.filter(b => b.id !== id);
            renderApp();
        }

        function updateBlocker(id, field, value) {
            const blocker = formData.blockers.find(b => b.id === id);
            if (blocker) blocker[field] = value;
        }

        function appendBlockerTag(id, tag) {
            const blocker = formData.blockers.find(b => b.id === id);
            if (blocker) {
                blocker.desc = blocker.desc ? blocker.desc + ' ' + tag : tag;
                renderApp();
            }
        }

        function addTodayPlan() {
            formData.todayPlans.push({ id: 'p' + Date.now(), task: '', output: '', progress: '', isHot: false });
            renderApp();
        }

        function removeTodayPlan(id) {
            formData.todayPlans = formData.todayPlans.filter(p => p.id !== id);
            renderApp();
        }

        function updateTodayPlan(id, field, value) {
            const plan = formData.todayPlans.find(p => p.id === id);
            if (plan) plan[field] = value;
        }

        function toggleHotPlan(id) {
            const plan = formData.todayPlans.find(p => p.id === id);
            if (plan) {
                plan.isHot = !plan.isHot;
                renderApp();
            }
        }

        // Định dạng tiền tệ VND khi rời khỏi ô nhập
        function formatCurrency(input, fieldName) {
            let value = input.value.replace(/\D/g, '');
            if (value !== '') {
                input.value = new Intl.NumberFormat('vi-VN').format(value);
                const taskId = input.id.replace(`${fieldName}-`, '');
                updateDetail(taskId, fieldName, value);
            }
        }

        function renderApp() {
            const container = document.getElementById('app-container');
            
            // 1. RENDER TASKS HÔM QUA
            const yesterdayTasksHtml = assignedTasks.map(task => {
                const isDone = formData.status[task.id] === 'done';
                const isDoing = formData.status[task.id] === 'doing';
                const details = formData.details[task.id] || {};

                return `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3 shadow-sm">
                        <!-- Header Task -->
                        <div class="flex items-center justify-between p-4 bg-slate-50">
                            <div class="flex items-center space-x-3">
                                <span class="text-xs font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded uppercase">${task.id}</span>
                                <span class="text-sm font-bold text-slate-800">${task.title}</span>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="setTaskStatus('${task.id}', 'done')" class="flex items-center px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${isDone ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'}">
                                    <i data-lucide="check-circle-2" class="w-4 h-4 mr-1"></i> Đã Xong (Kết quả)
                                </button>
                                <button onclick="setTaskStatus('${task.id}', 'doing')" class="flex items-center px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${isDoing ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'}">
                                    <i data-lucide="activity" class="w-4 h-4 mr-1"></i> Đang Làm
                                </button>
                            </div>
                        </div>

                        <!-- Dropdown Info cho Đã Xong (Form Sales) -->
                        <div class="expand-transition overflow-hidden bg-white border-t border-slate-100 ${isDone ? 'max-h-[1000px] opacity-100 p-4' : 'max-h-0 opacity-0 p-0 border-transparent'}">
                            <div class="mb-2">
                                <label class="block text-xs font-bold text-slate-500 mb-1">Ghi chú nhanh kết quả đạt được</label>
                                <input type="text" placeholder="VD: Đã tư vấn xong / Đã gửi báo giá qua email / Xử lý lỗi nạp thẻ..." class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-slate-700" value="${details.note || ''}" onchange="updateDetail('${task.id}', 'note', this.value)">
                            </div>

                            <!-- Toggle thông minh để hiện bảng Sale Metrics mới -->
                            <label class="flex items-center space-x-2 cursor-pointer mt-4 mb-3 p-2 bg-slate-50 rounded-lg border border-slate-200 w-max hover:bg-slate-100 transition-colors">
                                <input type="checkbox" class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500" 
                                       ${details.hasSaleMetrics ? 'checked' : ''} 
                                       onchange="updateDetail('${task.id}', 'hasSaleMetrics', this.checked); renderApp()">
                                <span class="text-xs font-bold text-slate-700 uppercase tracking-wide">Báo cáo Chỉ số Lead, Pipeline & Tickets</span>
                            </label>

                            <!-- Khối hiển thị số liệu Deal (Chỉ hiện khi tick Checkbox trên) -->
                            ${details.hasSaleMetrics ? `
                                <div class="space-y-4 bg-emerald-50/40 p-4 rounded-xl border border-emerald-100 animate-in fade-in duration-200">
                                    
                                    <!-- TẦNG 1: XỬ LÝ LEAD & SLA -->
                                    <div>
                                        <h4 class="text-[11px] font-black text-emerald-800 mb-2 uppercase tracking-wider flex items-center border-b border-emerald-200/50 pb-1.5">
                                            <i data-lucide="filter" class="w-3.5 h-3.5 mr-1.5 text-emerald-600"></i> Phễu Lead & Chăm sóc (Đảm bảo SLA)
                                        </h4>
                                        <!-- Update lưới 5 cột để thêm Lịch Demo -->
                                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                                            <div class="bg-white p-2 rounded-lg border border-emerald-100/50 shadow-sm">
                                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Lead nhận/Hunt</label>
                                                <input type="number" placeholder="0" class="w-full p-1.5 text-sm focus:outline-none font-bold text-slate-700 bg-transparent" value="${details.leadsReceived || ''}" onchange="updateDetail('${task.id}', 'leadsReceived', this.value)">
                                            </div>
                                            <div class="bg-white p-2 rounded-lg border border-emerald-100/50 shadow-sm">
                                                <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1">Đang xử lý</label>
                                                <input type="number" placeholder="0" class="w-full p-1.5 text-sm focus:outline-none font-bold text-blue-600 bg-transparent" value="${details.leadsAttempted || ''}" onchange="updateDetail('${task.id}', 'leadsAttempted', this.value)" title="Lead đang liên hệ, nurturing">
                                            </div>
                                            <div class="bg-white p-2 rounded-lg border border-emerald-100/50 shadow-sm">
                                                <label class="block text-[10px] font-bold text-emerald-600 uppercase mb-1">Đạt chuẩn (SQL)</label>
                                                <input type="number" placeholder="0" class="w-full p-1.5 text-sm focus:outline-none font-bold text-emerald-700 bg-transparent" value="${details.leadsQualified || ''}" onchange="updateDetail('${task.id}', 'leadsQualified', this.value)">
                                            </div>
                                            <div class="bg-amber-50 p-2 rounded-lg border border-amber-200/50 shadow-sm">
                                                <label class="block text-[10px] font-bold text-amber-600 uppercase mb-1">Lịch Demo Booked</label>
                                                <div class="relative">
                                                    <i data-lucide="calendar-check" class="absolute left-1.5 top-1.5 w-3.5 h-3.5 text-amber-500"></i>
                                                    <input type="number" placeholder="0" class="w-full p-1.5 pl-6 text-sm focus:outline-none font-bold text-amber-700 bg-transparent" value="${details.demosBooked || ''}" onchange="updateDetail('${task.id}', 'demosBooked', this.value)">
                                                </div>
                                            </div>
                                            <div class="bg-white p-2 rounded-lg border border-emerald-100/50 shadow-sm">
                                                <label class="block text-[10px] font-bold text-red-500 uppercase mb-1">Hủy / Rác</label>
                                                <input type="number" placeholder="0" class="w-full p-1.5 text-sm focus:outline-none font-bold text-red-600 bg-transparent" value="${details.leadsUnqualified || ''}" onchange="updateDetail('${task.id}', 'leadsUnqualified', this.value)">
                                            </div>
                                        </div>
                                    </div>

                                    <!-- TẦNG 2: PIPELINE & TICKETS -->
                                    <div>
                                        <h4 class="text-[11px] font-black text-emerald-800 mb-2 uppercase tracking-wider flex items-center border-b border-emerald-200/50 pb-1.5">
                                            <i data-lucide="briefcase" class="w-3.5 h-3.5 mr-1.5 text-emerald-600"></i> Cơ hội bán hàng & Hỗ trợ
                                        </h4>
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                            <div class="bg-white p-2.5 rounded-lg border border-emerald-100/50 shadow-sm">
                                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Giá trị Cơ hội mới (Opp Value)</label>
                                                <div class="relative flex items-center">
                                                    <input type="text" id="oppValue-${task.id}" placeholder="0" class="w-full p-1.5 pr-6 text-sm focus:outline-none font-bold text-slate-700 bg-transparent" value="${details.oppValue ? new Intl.NumberFormat('vi-VN').format(details.oppValue) : ''}" onblur="formatCurrency(this, 'oppValue')">
                                                    <span class="absolute right-2 text-slate-400 font-bold text-xs">₫</span>
                                                </div>
                                            </div>
                                            <div class="bg-emerald-100/50 p-2.5 rounded-lg border border-emerald-200 shadow-sm">
                                                <label class="block text-[10px] font-bold text-emerald-700 uppercase mb-1">Doanh thu chốt (WON)</label>
                                                <div class="relative flex items-center">
                                                    <input type="text" id="revenue-${task.id}" placeholder="0" class="w-full p-1.5 pr-6 text-sm focus:outline-none font-bold text-emerald-700 bg-transparent" value="${details.revenue ? new Intl.NumberFormat('vi-VN').format(details.revenue) : ''}" onblur="formatCurrency(this, 'revenue')">
                                                    <span class="absolute right-2 text-emerald-600/50 font-bold text-xs">₫</span>
                                                </div>
                                            </div>
                                            <div class="bg-white p-2.5 rounded-lg border border-emerald-100/50 shadow-sm">
                                                <div class="flex items-center justify-between mb-1">
                                                    <label class="block text-[10px] font-bold text-indigo-500 uppercase">Ticket Support</label>
                                                    <select class="text-[9px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 rounded px-1 outline-none py-0.5" onchange="updateDetail('${task.id}', 'ticketType', this.value)">
                                                        <option value="bug" ${details.ticketType==='bug'?'selected':''}>Lỗi Bug</option>
                                                        <option value="guide" ${details.ticketType==='guide'?'selected':''}>HDSD</option>
                                                        <option value="feature" ${details.ticketType==='feature'?'selected':''}>Tính năng mới</option>
                                                    </select>
                                                </div>
                                                <div class="relative">
                                                    <i data-lucide="life-buoy" class="absolute left-1.5 top-1.5 w-4 h-4 text-indigo-400"></i>
                                                    <input type="number" placeholder="Số lượng giải quyết..." class="w-full p-1.5 pl-7 text-sm focus:outline-none font-bold text-indigo-600 bg-transparent border-b border-indigo-50 border-dashed" value="${details.ticketsResolved || ''}" onchange="updateDetail('${task.id}', 'ticketsResolved', this.value)">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        <!-- Dropdown Info cho Đang Làm (Form Sales) -->
                        <div class="expand-transition overflow-hidden bg-white border-t border-slate-100 ${isDoing ? 'max-h-40 opacity-100 p-4' : 'max-h-0 opacity-0 p-0 border-transparent'}">
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                        <span>Cập nhật % Tiến độ (Nếu có):</span>
                                        <span id="prog-val-${task.id}" class="text-blue-600 text-sm">${details.progress || 50}%</span>
                                    </label>
                                    <input type="range" min="0" max="95" step="5" value="${details.progress || 50}" 
                                        class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                        oninput="updateDetail('${task.id}', 'progress', this.value)">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-2">Tình trạng chăm sóc (Follow-up)</label>
                                    <select class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-slate-700" onchange="updateDetail('${task.id}', 'followupStatus', this.value)">
                                        <option value="following" ${details.followupStatus==='following'?'selected':''}>📞 Đang bám sát / Gọi lại</option>
                                        <option value="waiting_customer" ${details.followupStatus==='waiting_customer'?'selected':''}>⏳ Đang chờ khách hàng phản hồi</option>
                                        <option value="waiting_internal" ${details.followupStatus==='waiting_internal'?'selected':''}>⚙️ Đang chờ đội Tech / Mkt hỗ trợ</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <!-- Header (Màu Xanh Ngọc đặc trưng Sales) -->
                <div class="bg-emerald-700 rounded-2xl shadow-lg p-6 text-white flex justify-between items-center flex-wrap gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="h-12 w-12 bg-white text-emerald-700 rounded-full flex items-center justify-center font-black text-xl">${currentUser.avatar}</div>
                        <div>
                            <h1 class="text-2xl font-black flex items-center"><i data-lucide="banknote" class="mr-2"></i> SALES DAILY SYNC</h1>
                            <p class="text-emerald-100 text-sm font-medium">Xin chào ${currentUser.name} (${currentUser.role})</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center bg-emerald-800/60 p-2.5 rounded-xl border border-emerald-600 hover:bg-emerald-800 transition-colors">
                        <i data-lucide="calendar-clock" class="w-5 h-5 text-emerald-200 mr-3"></i>
                        <div class="flex flex-col">
                            <label class="text-[10px] text-emerald-200 font-bold uppercase tracking-wider leading-none mb-1.5">Ngày báo cáo</label>
                            <input type="date" value="${formData.reportDate}" onchange="formData.reportDate = this.value; renderApp()" class="bg-transparent text-white text-sm font-bold focus:outline-none cursor-pointer [color-scheme:dark] p-0 border-0 leading-none">
                        </div>
                    </div>
                </div>

                <!-- P1: Hôm qua -->
                <div class="mt-6">
                    <h2 class="text-lg font-black text-slate-800 mb-3 flex items-center"><i data-lucide="history" class="mr-2 text-emerald-500"></i>1. Review công việc hôm qua</h2>
                    ${yesterdayTasksHtml}
                </div>

                <!-- P2: Blockers (Rào cản Sales) -->
                <div class="mt-6 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-black text-slate-800 flex items-center">
                            <i data-lucide="alert-octagon" class="mr-2 text-red-500 w-5 h-5"></i>
                            2. Khó khăn & Nguy cơ Rớt Deal
                        </h2>
                        <button onclick="addBlocker()" class="text-sm font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Thêm Vấn đề
                        </button>
                    </div>

                    ${formData.blockers.length === 0 ? `
                        <div class="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-xl">
                            <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-100 text-emerald-500 rounded-full mb-3">
                                <i data-lucide="check-check" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-bold text-slate-600">Tuyệt vời, không có rào cản!</p>
                            <p class="text-xs text-slate-400 mt-1">Đường chốt Sales đang hoàn toàn rộng mở.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            ${formData.blockers.map((blocker, index) => `
                                <div class="p-4 border border-red-100 bg-red-50/40 rounded-xl relative group">
                                    <button onclick="removeBlocker('${blocker.id}')" class="absolute top-3 right-3 text-red-300 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100" title="Xóa rào cản này">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                    
                                    <div class="mb-4 pr-8">
                                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Khách hàng / Deal đang gặp vấn đề</label>
                                        <div class="relative">
                                            <input list="assigned-tasks" value="${blocker.task}" onchange="updateBlocker('${blocker.id}', 'task', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none font-semibold text-slate-700 bg-white" placeholder="Chọn task/deal đang bị kẹt...">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="md:col-span-2">
                                            <div class="flex justify-between items-end mb-1.5">
                                                <label class="block text-[11px] font-bold text-slate-500 uppercase">Nguyên nhân chi tiết</label>
                                                <div class="flex gap-1.5 flex-wrap justify-end">
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Khách chê giá cao]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chê giá</button>
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Chờ Tech fix lỗi/ticket]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chờ Tech</button>
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Lead rác/Sai số]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Lead rác</button>
                                                </div>
                                            </div>
                                            <textarea onchange="updateBlocker('${blocker.id}', 'desc', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none min-h-[60px] bg-white placeholder-slate-400" placeholder="Mô tả tại sao khó chốt/hỗ trợ...">${blocker.desc}</textarea>
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Nguy cơ Rớt Deal/Phàn nàn</label>
                                            <select onchange="updateBlocker('${blocker.id}', 'impact', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none bg-white font-semibold ${blocker.impact === 'high' ? 'text-red-600' : 'text-slate-700'}">
                                                <option value="none" ${blocker.impact === 'none' ? 'selected' : ''}>🟢 Vẫn đang mồi / Cứu được</option>
                                                <option value="low" ${blocker.impact === 'low' ? 'selected' : ''}>🟡 Khách lạnh dần / Bắt đầu giục</option>
                                                <option value="high" ${blocker.impact === 'high' ? 'selected' : ''}>🔴 Nguy cơ Fail Deal/Refund (Cần PM)</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>

                <!-- P3: Hôm nay (Dùng chung UI Card chuẩn) -->
                <div class="mt-6 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-black text-slate-800 flex items-center">
                            <i data-lucide="target" class="mr-2 text-amber-500 w-5 h-5"></i>
                            3. Mục tiêu Focus hôm nay
                        </h2>
                        <button onclick="addTodayPlan()" class="text-sm font-bold text-amber-600 bg-amber-50 px-3 py-1.5 rounded-lg hover:bg-amber-100 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Thêm Công việc
                        </button>
                    </div>

                    ${formData.todayPlans.length === 0 ? `
                        <div class="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-xl">
                            <div class="inline-flex items-center justify-center w-12 h-12 bg-amber-100 text-amber-500 rounded-full mb-3">
                                <i data-lucide="target" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-bold text-slate-600">Chưa có mục tiêu nào!</p>
                            <p class="text-xs text-slate-400 mt-1">Hãy thêm Deal / Khách hàng bạn dự định focus hôm nay.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            ${formData.todayPlans.map((plan, index) => `
                                <div class="p-4 rounded-xl relative group transition-all ${plan.isHot ? 'border-2 border-red-300 bg-red-50/30 shadow-md' : 'border border-amber-100 bg-amber-50/40'}">
                                    <button onclick="removeTodayPlan('${plan.id}')" class="absolute top-3 right-3 text-amber-400 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100 z-10" title="Xóa công việc này">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                    
                                    <div class="mb-4 pr-8">
                                        <div class="flex justify-between items-end mb-1.5">
                                            <label class="block text-[11px] font-bold ${plan.isHot ? 'text-red-600' : 'text-slate-500'} uppercase">Mục tiêu Sales #${index + 1}</label>
                                            <button onclick="toggleHotPlan('${plan.id}')" class="flex items-center px-2 py-1 rounded text-[10px] font-bold border transition-colors ${plan.isHot ? 'bg-red-50 border-red-200 text-red-600 shadow-sm' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}">
                                                <i data-lucide="flame" class="w-3 h-3 mr-1 ${plan.isHot ? 'fill-red-500 text-red-500' : ''}"></i> Deal Nóng (Cần PM hỗ trợ)
                                            </button>
                                        </div>
                                        <div class="relative">
                                            <input list="assigned-tasks" value="${plan.task}" onchange="updateTodayPlan('${plan.id}', 'task', this.value)" class="w-full text-sm p-2.5 rounded-lg border ${plan.isHot ? 'border-red-200 focus:border-red-500 focus:ring-red-500' : 'border-amber-200 focus:border-amber-400 focus:ring-amber-400'} focus:ring-1 outline-none font-semibold text-slate-700 bg-white" placeholder="Chọn Khách hàng / Task...">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div class="md:col-span-3">
                                            <label class="block text-[11px] font-bold ${plan.isHot ? 'text-red-500' : 'text-slate-500'} uppercase mb-1.5">Cam kết đầu ra</label>
                                            <input type="text" onchange="updateTodayPlan('${plan.id}', 'output', this.value)" class="w-full text-sm p-2.5 rounded-lg border ${plan.isHot ? 'border-red-200 focus:border-red-500 focus:ring-red-500' : 'border-amber-200 focus:border-amber-400 focus:ring-amber-400'} focus:ring-1 outline-none bg-white placeholder-slate-400" placeholder="Kết quả sẽ đạt được (Gửi BG, Gọi 10 KH, Fix 5 Ticket...)" value="${plan.output}">
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-bold ${plan.isHot ? 'text-red-500' : 'text-slate-500'} uppercase mb-1.5">Dự kiến tiến độ</label>
                                            <div class="relative flex items-center">
                                                <span class="absolute left-3 text-slate-400 font-bold">+</span>
                                                <input type="number" onchange="updateTodayPlan('${plan.id}', 'progress', this.value)" class="w-full text-sm p-2.5 pl-7 pr-8 rounded-lg border ${plan.isHot ? 'border-red-200 focus:border-red-500 focus:ring-red-500 text-red-600' : 'border-amber-200 focus:border-amber-400 focus:ring-amber-400 text-amber-600'} focus:ring-1 outline-none bg-white font-bold" placeholder="0" value="${plan.progress}">
                                                <span class="absolute right-3 text-slate-400 font-bold">%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}

                    <datalist id="assigned-tasks">
                        ${assignedTasks.map(t => `<option value="${t.id} - ${t.title}"></option>`).join('')}
                    </datalist>
                </div>

                <button class="w-full mt-6 py-3.5 rounded-xl font-black text-white bg-emerald-600 hover:bg-emerald-700 shadow-lg flex justify-center items-center transition-all hover:scale-[1.01] active:scale-[0.98]" onclick="alert('Đã nộp báo cáo cho ngày: ' + formData.reportDate)">
                    <i data-lucide="send" class="w-5 h-5 mr-2"></i> Gửi Báo Cáo Daily
                </button>
            `;
            lucide.createIcons();
        }

        renderApp();
    </script>
</body>
</html>
