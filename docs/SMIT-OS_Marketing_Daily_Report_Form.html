<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT OS - Marketing Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .expand-transition { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease-in-out; }
        /* Tùy chỉnh icon calendar màu trắng trên nền tối */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 py-8 px-4 text-slate-800 min-h-screen">

    <div class="max-w-3xl mx-auto space-y-6" id="app-container">
        <!-- Render from JS -->
    </div>

    <script>
        // MOCK DATA: Đội Marketing
        const currentUser = { name: 'Hà Canh', role: 'Mkt Leader', avatar: 'HC' };
        
        const assignedTasks = [
            { id: 'MKT-101', title: 'Tái cơ cấu ngân sách & Nội dung FB Ads' },
            { id: 'MKT-105', title: 'Thiết kế Wireframe 5 Landing Pages Ads' },
            { id: 'MKT-108', title: 'Lên Brief kịch bản chi tiết 4 tuyến UGC' },
            { id: 'MKT-110', title: 'Setup Tracking In-app & Web' }
        ];

        let formData = {
            reportDate: '2026-04-14', 
            status: {}, 
            details: {}, 
            
            blockers: [
                { id: 'b1', task: 'MKT-110 - Setup Tracking In-app & Web', desc: 'Web chưa index xong và chưa chốt luồng UI cuối cùng từ Tech nên chưa gắn mã GA4/Pixel được.', impact: 'high' }
            ],

            todayPlans: [
                { id: 'p1', task: 'MKT-101 - Tái cơ cấu ngân sách & Nội dung FB Ads', output: 'Vít 20% ngân sách vào 2 case Win đang có CPA rẻ', progress: '100', isKeyCamp: true },
                { id: 'p2', task: 'MKT-108 - Lên Brief kịch bản chi tiết 4 tuyến UGC', output: 'Bàn giao file Brief cho Media quay dựng', progress: '100', isKeyCamp: false }
            ]
        };

        // --- CÁC HÀM XỬ LÝ PHẦN 1 ---
        function setTaskStatus(taskId, status) {
            if (formData.status[taskId] === status) {
                delete formData.status[taskId];
            } else {
                formData.status[taskId] = status;
                if(!formData.details[taskId]) {
                    formData.details[taskId] = { 
                        progress: 50, link: '', 
                        hasMetrics: false, spend: '', leads: '', cpa: '', adsTested: '', // Đề xuất mới: adsTested
                        campStatus: 'normal' 
                    };
                }
            }
            renderApp();
        }

        function updateDetail(taskId, field, value) {
            formData.details[taskId][field] = value;
            if(field === 'progress') {
                document.getElementById(`prog-val-${taskId}`).innerText = value + '%';
            }
        }

        // Tự động tính CPA
        function calculateCPA(taskId) {
            const spend = parseFloat(document.getElementById(`spend-${taskId}`).value.replace(/\D/g, '')) || 0;
            const leads = parseFloat(document.getElementById(`leads-${taskId}`).value) || 0;
            if (leads > 0) {
                const cpa = Math.round(spend / leads);
                formData.details[taskId].cpa = cpa;
                document.getElementById(`cpa-${taskId}`).value = new Intl.NumberFormat('vi-VN').format(cpa);
            }
        }

        function formatCurrency(input, taskId, fieldName) {
            let value = input.value.replace(/\D/g, '');
            if (value !== '') {
                input.value = new Intl.NumberFormat('vi-VN').format(value);
                updateDetail(taskId, fieldName, value);
                calculateCPA(taskId);
            }
        }

        // --- CÁC HÀM XỬ LÝ PHẦN 2 (BLOCKERS) ---
        function addBlocker() {
            formData.blockers.push({ id: 'b' + Date.now(), task: '', desc: '', impact: 'none' });
            renderApp();
        }

        function removeBlocker(id) {
            formData.blockers = formData.blockers.filter(b => b.id !== id);
            renderApp();
        }

        function updateBlocker(id, field, value) {
            const blocker = formData.blockers.find(b => b.id === id);
            if (blocker) blocker[field] = value;
        }

        function appendBlockerTag(id, tag) {
            const blocker = formData.blockers.find(b => b.id === id);
            if (blocker) {
                blocker.desc = blocker.desc ? blocker.desc + ' ' + tag : tag;
                renderApp();
            }
        }

        // --- CÁC HÀM XỬ LÝ PHẦN 3 ---
        function addTodayPlan() {
            formData.todayPlans.push({ id: 'p' + Date.now(), task: '', output: '', progress: '', isKeyCamp: false });
            renderApp();
        }

        function removeTodayPlan(id) {
            formData.todayPlans = formData.todayPlans.filter(p => p.id !== id);
            renderApp();
        }

        function updateTodayPlan(id, field, value) {
            const plan = formData.todayPlans.find(p => p.id === id);
            if (plan) plan[field] = value;
        }

        function toggleKeyCampPlan(id) {
            const plan = formData.todayPlans.find(p => p.id === id);
            if (plan) {
                plan.isKeyCamp = !plan.isKeyCamp;
                renderApp();
            }
        }

        function renderApp() {
            const container = document.getElementById('app-container');
            
            // 1. RENDER TASKS HÔM QUA
            const yesterdayTasksHtml = assignedTasks.map(task => {
                const isDone = formData.status[task.id] === 'done';
                const isDoing = formData.status[task.id] === 'doing';
                const details = formData.details[task.id] || {};

                return `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3 shadow-sm">
                        <!-- Header Task -->
                        <div class="flex items-center justify-between p-4 bg-slate-50">
                            <div class="flex items-center space-x-3">
                                <span class="text-xs font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded uppercase">${task.id}</span>
                                <span class="text-sm font-bold text-slate-800">${task.title}</span>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="setTaskStatus('${task.id}', 'done')" class="flex items-center px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${isDone ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'}">
                                    <i data-lucide="check-circle-2" class="w-4 h-4 mr-1"></i> Đã Xong / Chốt số
                                </button>
                                <button onclick="setTaskStatus('${task.id}', 'doing')" class="flex items-center px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${isDoing ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'}">
                                    <i data-lucide="activity" class="w-4 h-4 mr-1"></i> Đang Làm
                                </button>
                            </div>
                        </div>

                        <!-- Dropdown Info cho Đã Xong (Form Marketing) -->
                        <div class="expand-transition overflow-hidden bg-white border-t border-slate-100 ${isDone ? 'max-h-[800px] opacity-100 p-4' : 'max-h-0 opacity-0 p-0 border-transparent'}">
                            <div class="mb-2">
                                <label class="block text-xs font-bold text-slate-500 mb-1">Kết quả đầu ra / Link tài liệu</label>
                                <input type="text" placeholder="VD: Đã duyệt xong kịch bản / Link Docs..." class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-orange-500 outline-none font-medium text-slate-700" value="${details.link || ''}" onchange="updateDetail('${task.id}', 'link', this.value)">
                            </div>

                            <!-- Toggle thông minh để hiện bảng số liệu -->
                            <label class="flex items-center space-x-2 cursor-pointer mt-4 mb-3 p-2 bg-slate-50 rounded-lg border border-slate-200 w-max hover:bg-slate-100 transition-colors">
                                <input type="checkbox" class="w-4 h-4 text-orange-600 rounded border-slate-300 focus:ring-orange-500" 
                                       ${details.hasMetrics ? 'checked' : ''} 
                                       onchange="updateDetail('${task.id}', 'hasMetrics', this.checked); renderApp()">
                                <span class="text-xs font-bold text-slate-700 uppercase tracking-wide">Báo cáo số liệu Performance (Ads / A-B Test)</span>
                            </label>

                            <!-- Khối hiển thị số liệu (Đã bổ sung cột A/B Testing) -->
                            ${details.hasMetrics ? `
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-orange-50/50 p-4 rounded-xl border border-orange-100 animate-in fade-in duration-200">
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Ngân sách (Spend)</label>
                                        <div class="relative flex items-center">
                                            <input type="text" id="spend-${task.id}" placeholder="0" class="w-full border border-orange-200 rounded-lg p-2 pr-6 text-sm focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700 bg-white" value="${details.spend ? new Intl.NumberFormat('vi-VN').format(details.spend) : ''}" onblur="formatCurrency(this, '${task.id}', 'spend')">
                                            <span class="absolute right-2 text-xs text-slate-400 font-bold">₫</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Số MQLs (Lead)</label>
                                        <div class="relative">
                                            <i data-lucide="users" class="absolute left-2 top-2.5 w-3.5 h-3.5 text-orange-400"></i>
                                            <input type="number" id="leads-${task.id}" placeholder="0" class="w-full border border-orange-200 rounded-lg p-2 pl-7 text-sm focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700 bg-white" value="${details.leads || ''}" onchange="updateDetail('${task.id}', 'leads', this.value); calculateCPA('${task.id}')">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">CPA (Giá/Lead)</label>
                                        <div class="relative flex items-center">
                                            <input type="text" id="cpa-${task.id}" placeholder="Auto" class="w-full border border-orange-200 bg-orange-100/50 rounded-lg p-2 pr-6 text-sm outline-none font-bold text-orange-700" value="${details.cpa ? new Intl.NumberFormat('vi-VN').format(details.cpa) : ''}" readonly>
                                            <span class="absolute right-2 text-xs text-orange-600/50 font-bold">₫</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Số Mẫu Ads lên Test</label>
                                        <div class="relative">
                                            <i data-lucide="flask-conical" class="absolute left-2 top-2.5 w-3.5 h-3.5 text-purple-500"></i>
                                            <input type="number" placeholder="0 mẫu" class="w-full border border-purple-200 rounded-lg p-2 pl-7 text-sm focus:ring-2 focus:ring-purple-500 outline-none font-bold text-purple-700 bg-white" value="${details.adsTested || ''}" onchange="updateDetail('${task.id}', 'adsTested', this.value)" title="Chỉ số dự báo: Hôm nay lên được bao nhiêu mẫu content/ads mới để A/B test?">
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        <!-- Dropdown Info cho Đang Làm (Cập nhật Trạng thái SLA) -->
                        <div class="expand-transition overflow-hidden bg-white border-t border-slate-100 ${isDoing ? 'max-h-40 opacity-100 p-4' : 'max-h-0 opacity-0 p-0 border-transparent'}">
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                        <span>Cập nhật % Tiến độ:</span>
                                        <span id="prog-val-${task.id}" class="text-blue-600 text-sm">${details.progress || 50}%</span>
                                    </label>
                                    <input type="range" min="0" max="95" step="5" value="${details.progress || 50}" 
                                        class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                        oninput="updateDetail('${task.id}', 'progress', this.value)">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-2">Tình trạng Camp / SLA Phối hợp</label>
                                    <select class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-slate-700" onchange="updateDetail('${task.id}', 'campStatus', this.value)">
                                        <option value="normal" ${details.campStatus==='normal'?'selected':''}>🟢 Ổn định / Đang chạy tốt</option>
                                        <option value="testing" ${details.campStatus==='testing'?'selected':''}>🧪 Đang Test mẫu mới (A/B Test)</option>
                                        <option value="waiting_media" ${details.campStatus==='waiting_media'?'selected':''}>⏳ Đang chờ Media trả Video/Ảnh</option>
                                        <option value="expensive" ${details.campStatus==='expensive'?'selected':''}>🟡 Camp bị đắt / Không cắn tiền</option>
                                        <option value="banned" ${details.campStatus==='banned'?'selected':''}>🔴 Chết Tài khoản / Khóa Page</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <!-- Header (Màu Cam đặc trưng Mkt) -->
                <div class="bg-orange-600 rounded-2xl shadow-lg p-6 text-white flex justify-between items-center flex-wrap gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="h-12 w-12 bg-white text-orange-600 rounded-full flex items-center justify-center font-black text-xl">${currentUser.avatar}</div>
                        <div>
                            <h1 class="text-2xl font-black flex items-center"><i data-lucide="megaphone" class="mr-2"></i> MKT DAILY SYNC</h1>
                            <p class="text-orange-100 text-sm font-medium">Xin chào ${currentUser.name} (${currentUser.role})</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center bg-orange-700/60 p-2.5 rounded-xl border border-orange-500 hover:bg-orange-700 transition-colors">
                        <i data-lucide="calendar-clock" class="w-5 h-5 text-orange-200 mr-3"></i>
                        <div class="flex flex-col">
                            <label class="text-[10px] text-orange-200 font-bold uppercase tracking-wider leading-none mb-1.5">Ngày báo cáo</label>
                            <input type="date" value="${formData.reportDate}" onchange="formData.reportDate = this.value; renderApp()" class="bg-transparent text-white text-sm font-bold focus:outline-none cursor-pointer [color-scheme:dark] p-0 border-0 leading-none">
                        </div>
                    </div>
                </div>

                <!-- P1: Hôm qua -->
                <div class="mt-6">
                    <h2 class="text-lg font-black text-slate-800 mb-3 flex items-center"><i data-lucide="history" class="mr-2 text-orange-500"></i>1. Review công việc hôm qua</h2>
                    ${yesterdayTasksHtml}
                </div>

                <!-- P2: Blockers (Rào cản MKT) -->
                <div class="mt-6 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-black text-slate-800 flex items-center">
                            <i data-lucide="alert-octagon" class="mr-2 text-red-500 w-5 h-5"></i>
                            2. Khó khăn & Rủi ro trễ tiến độ
                        </h2>
                        <button onclick="addBlocker()" class="text-sm font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Thêm Vấn đề
                        </button>
                    </div>

                    ${formData.blockers.length === 0 ? `
                        <div class="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-xl">
                            <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-100 text-emerald-500 rounded-full mb-3">
                                <i data-lucide="check-check" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-bold text-slate-600">Mọi việc đều suôn sẻ!</p>
                            <p class="text-xs text-slate-400 mt-1">Không có rào cản nào ngăn bạn ra Lead.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            ${formData.blockers.map((blocker, index) => `
                                <div class="p-4 border border-red-100 bg-red-50/40 rounded-xl relative group">
                                    <button onclick="removeBlocker('${blocker.id}')" class="absolute top-3 right-3 text-red-300 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100" title="Xóa rào cản này">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                    
                                    <div class="mb-4 pr-8">
                                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Công việc / Chiến dịch bị nghẽn</label>
                                        <div class="relative">
                                            <input list="assigned-tasks" value="${blocker.task}" onchange="updateBlocker('${blocker.id}', 'task', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none font-semibold text-slate-700 bg-white" placeholder="Chọn task đang bị kẹt...">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="md:col-span-2">
                                            <div class="flex justify-between items-end mb-1.5">
                                                <label class="block text-[11px] font-bold text-slate-500 uppercase">Mô tả rào cản</label>
                                                <div class="flex gap-1.5 flex-wrap justify-end">
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Chờ Media cấp Video]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chờ Video</button>
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Chờ Tech làm Web/Tracking]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chờ Tech (Web)</button>
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[TKQC chết/Khóa page]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chết TKQC</button>
                                                </div>
                                            </div>
                                            <textarea onchange="updateBlocker('${blocker.id}', 'desc', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none min-h-[60px] bg-white placeholder-slate-400" placeholder="Mô tả chi tiết...">${blocker.desc}</textarea>
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Mức độ nguy cơ</label>
                                            <select onchange="updateBlocker('${blocker.id}', 'impact', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none bg-white font-semibold ${blocker.impact === 'high' ? 'text-red-600' : 'text-slate-700'}">
                                                <option value="none" ${blocker.impact === 'none' ? 'selected' : ''}>🟢 Vẫn kiểm soát được</option>
                                                <option value="low" ${blocker.impact === 'low' ? 'selected' : ''}>🟡 Bị chậm / Không đạt KPIs</option>
                                                <option value="high" ${blocker.impact === 'high' ? 'selected' : ''}>🔴 Gãy luồng Campaign (Cần PM)</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>

                <!-- P3: Hôm nay (CẬP NHẬT CỜ CAMP TRỌNG ĐIỂM) -->
                <div class="mt-6 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-black text-slate-800 flex items-center">
                            <i data-lucide="target" class="mr-2 text-amber-500 w-5 h-5"></i>
                            3. Mục tiêu Focus hôm nay
                        </h2>
                        <button onclick="addTodayPlan()" class="text-sm font-bold text-orange-600 bg-orange-50 px-3 py-1.5 rounded-lg hover:bg-orange-100 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Thêm Công việc
                        </button>
                    </div>

                    ${formData.todayPlans.length === 0 ? `
                        <div class="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-xl">
                            <div class="inline-flex items-center justify-center w-12 h-12 bg-orange-100 text-orange-500 rounded-full mb-3">
                                <i data-lucide="target" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-bold text-slate-600">Chưa có mục tiêu nào!</p>
                            <p class="text-xs text-slate-400 mt-1">Hãy thêm công việc bạn dự định focus trong hôm nay.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            ${formData.todayPlans.map((plan, index) => `
                                <div class="p-4 rounded-xl relative group transition-all ${plan.isKeyCamp ? 'border-2 border-orange-400 bg-orange-50/50 shadow-md' : 'border border-slate-200 bg-slate-50/50'}">
                                    <button onclick="removeTodayPlan('${plan.id}')" class="absolute top-3 right-3 text-slate-400 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100 z-10" title="Xóa công việc này">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                    
                                    <div class="mb-4 pr-8">
                                        <div class="flex justify-between items-end mb-1.5">
                                            <label class="block text-[11px] font-bold ${plan.isKeyCamp ? 'text-orange-600' : 'text-slate-500'} uppercase">Mục tiêu MKT #${index + 1}</label>
                                            
                                            <!-- Nút Cờ Camp Trọng Điểm -->
                                            <button onclick="toggleKeyCampPlan('${plan.id}')" class="flex items-center px-2 py-1 rounded text-[10px] font-bold border transition-colors ${plan.isKeyCamp ? 'bg-orange-100 border-orange-300 text-orange-700 shadow-sm' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}">
                                                <i data-lucide="rocket" class="w-3 h-3 mr-1 ${plan.isKeyCamp ? 'text-orange-600' : ''}"></i> Camp Trọng Điểm (Vít Budget)
                                            </button>
                                        </div>
                                        <div class="relative">
                                            <input list="assigned-tasks" value="${plan.task}" onchange="updateTodayPlan('${plan.id}', 'task', this.value)" class="w-full text-sm p-2.5 rounded-lg border ${plan.isKeyCamp ? 'border-orange-300 focus:border-orange-500 focus:ring-orange-500' : 'border-slate-300 focus:border-orange-500 focus:ring-orange-500'} focus:ring-1 outline-none font-semibold text-slate-700 bg-white" placeholder="Chọn Campaign / Task cần focus...">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div class="md:col-span-3">
                                            <label class="block text-[11px] font-bold ${plan.isKeyCamp ? 'text-orange-500' : 'text-slate-500'} uppercase mb-1.5">Cam kết đầu ra</label>
                                            <input type="text" onchange="updateTodayPlan('${plan.id}', 'output', this.value)" class="w-full text-sm p-2.5 rounded-lg border ${plan.isKeyCamp ? 'border-orange-300 focus:border-orange-500 focus:ring-orange-500' : 'border-slate-300 focus:border-orange-500 focus:ring-orange-500'} focus:ring-1 outline-none bg-white placeholder-slate-400" placeholder="Kết quả sẽ đạt được (Vít ngân sách, Test 5 mẫu...)" value="${plan.output}">
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-bold ${plan.isKeyCamp ? 'text-orange-500' : 'text-slate-500'} uppercase mb-1.5">Dự kiến tiến độ</label>
                                            <div class="relative flex items-center">
                                                <span class="absolute left-3 text-slate-400 font-bold">+</span>
                                                <input type="number" onchange="updateTodayPlan('${plan.id}', 'progress', this.value)" class="w-full text-sm p-2.5 pl-7 pr-8 rounded-lg border ${plan.isKeyCamp ? 'border-orange-300 focus:border-orange-500 focus:ring-orange-500 text-orange-600' : 'border-slate-300 focus:border-orange-500 focus:ring-orange-500 text-orange-600'} focus:ring-1 outline-none bg-white font-bold" placeholder="0" value="${plan.progress}">
                                                <span class="absolute right-3 text-slate-400 font-bold">%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}

                    <datalist id="assigned-tasks">
                        ${assignedTasks.map(t => `<option value="${t.id} - ${t.title}"></option>`).join('')}
                    </datalist>
                </div>

                <button class="w-full mt-6 py-3.5 rounded-xl font-black text-white bg-orange-600 hover:bg-orange-700 shadow-lg flex justify-center items-center transition-all hover:scale-[1.01] active:scale-[0.98]" onclick="alert('Đã nộp báo cáo cho ngày: ' + formData.reportDate)">
                    <i data-lucide="send" class="w-5 h-5 mr-2"></i> Gửi Báo Cáo Daily
                </button>
            `;
            lucide.createIcons();
        }

        renderApp();
    </script>
</body>
</html>
