<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT OS - Tech Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .expand-transition { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease-in-out; }
        /* Tùy chỉnh icon calendar màu trắng trên nền tối */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 py-8 px-4 text-slate-800 min-h-screen">

    <div class="max-w-3xl mx-auto space-y-6" id="app-container">
        <!-- Render from JS -->
    </div>

    <script>
        // MOCK DATA TỪ FILE "Báo cáo công việc.csv"
        const currentUser = { name: 'Ngọc Phong', role: 'Backend Developer', avatar: 'NP' };
        
        const assignedTasks = [
            { id: 'TECH-201', title: 'Code luồng phân quyền SMIT-Chat' },
            { id: 'TECH-205', title: 'Viết API màn nhân viên (SCRM)' },
            { id: 'TECH-208', title: 'Tạo DB và đồng bộ social FB' },
            { id: 'TECH-215', title: '[Khẩn] Lỗi rớt mạng khi Call API lấy Token' }
        ];

        let formData = {
            reportDate: '2026-04-14', 
            status: {}, 
            details: {}, 
            
            blockers: [
                { id: 'b1', task: 'TECH-201 - Code luồng phân quyền SMIT-Chat', desc: 'Đang chờ API data cấu trúc từ Core hệ thống trả về mới test được.', impact: 'low' }
            ],

            todayPlans: [
                { id: 'p1', task: 'TECH-215 - [Khẩn] Lỗi rớt mạng khi Call API lấy Token', output: 'Fix dứt điểm lỗi timeout 504 trên môi trường Production', progress: '100', isP0: true },
                { id: 'p2', task: 'TECH-205 - Viết API màn nhân viên (SCRM)', output: 'Hoàn thiện 50% các endpoint', progress: '50', isP0: false }
            ]
        };

        // --- CÁC HÀM XỬ LÝ PHẦN 1 ---
        function setTaskStatus(taskId, status) {
            if (formData.status[taskId] === status) {
                delete formData.status[taskId]; // Bỏ tick
            } else {
                formData.status[taskId] = status; // Tick mới
                if(!formData.details[taskId]) {
                    // Thêm trường taskType để phân loại Feature vs Bug
                    formData.details[taskId] = { progress: 50, prLink: '', env: 'local', taskType: 'feature' };
                }
            }
            renderApp();
        }

        function updateDetail(taskId, field, value) {
            formData.details[taskId][field] = value;
            if(field === 'progress') {
                document.getElementById(`prog-val-${taskId}`).innerText = value + '%';
            }
        }

        // --- CÁC HÀM XỬ LÝ PHẦN 2 (BLOCKERS) ---
        function addBlocker() {
            formData.blockers.push({ id: 'b' + Date.now(), task: '', desc: '', impact: 'none' });
            renderApp();
        }

        function removeBlocker(id) {
            formData.blockers = formData.blockers.filter(b => b.id !== id);
            renderApp();
        }

        function updateBlocker(id, field, value) {
            const blocker = formData.blockers.find(b => b.id === id);
            if (blocker) blocker[field] = value;
        }

        function appendBlockerTag(id, tag) {
            const blocker = formData.blockers.find(b => b.id === id);
            if (blocker) {
                blocker.desc = blocker.desc ? blocker.desc + ' ' + tag : tag;
                renderApp();
            }
        }

        // --- CÁC HÀM XỬ LÝ PHẦN 3 ---
        function addTodayPlan() {
            formData.todayPlans.push({ id: 'p' + Date.now(), task: '', output: '', progress: '', isP0: false });
            renderApp();
        }

        function removeTodayPlan(id) {
            formData.todayPlans = formData.todayPlans.filter(p => p.id !== id);
            renderApp();
        }

        function updateTodayPlan(id, field, value) {
            const plan = formData.todayPlans.find(p => p.id === id);
            if (plan) plan[field] = value;
        }

        function toggleP0Plan(id) {
            const plan = formData.todayPlans.find(p => p.id === id);
            if (plan) {
                plan.isP0 = !plan.isP0;
                renderApp();
            }
        }

        function renderApp() {
            const container = document.getElementById('app-container');
            
            // 1. RENDER TASKS HÔM QUA
            const yesterdayTasksHtml = assignedTasks.map(task => {
                const isDone = formData.status[task.id] === 'done';
                const isDoing = formData.status[task.id] === 'doing';
                const details = formData.details[task.id] || {};

                return `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3 shadow-sm">
                        <!-- Header Task -->
                        <div class="flex items-center justify-between p-4 bg-slate-50">
                            <div class="flex items-center space-x-3">
                                <span class="text-xs font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded uppercase">${task.id}</span>
                                <span class="text-sm font-bold text-slate-800">${task.title}</span>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="setTaskStatus('${task.id}', 'done')" class="flex items-center px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${isDone ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'}">
                                    <i data-lucide="check-circle-2" class="w-4 h-4 mr-1"></i> Đã Xong
                                </button>
                                <button onclick="setTaskStatus('${task.id}', 'doing')" class="flex items-center px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${isDoing ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'}">
                                    <i data-lucide="activity" class="w-4 h-4 mr-1"></i> Đang Làm
                                </button>
                            </div>
                        </div>

                        <!-- Dropdown Info cho Đã Xong (Form Tech Cập Nhật) -->
                        <div class="expand-transition overflow-hidden bg-white border-t border-slate-100 ${isDone ? 'max-h-[500px] opacity-100 p-4' : 'max-h-0 opacity-0 p-0 border-transparent'}">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-bold text-slate-500 mb-1">Link PR / Nhánh Code (Branch)</label>
                                    <input type="text" placeholder="VD: feature/smit-chat-auth" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-semibold text-slate-700" value="${details.prLink || ''}" onchange="updateDetail('${task.id}', 'prLink', this.value)">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1">Trạng thái Test</label>
                                    <select class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-semibold text-slate-700" onchange="updateDetail('${task.id}', 'env', this.value)">
                                        <option value="local" ${details.env==='local'?'selected':''}>💻 Pass Local</option>
                                        <option value="staging" ${details.env==='staging'?'selected':''}>🧪 Đã lên Staging (Chờ QA)</option>
                                        <option value="prod" ${details.env==='prod'?'selected':''}>🚀 Đã lên Production</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Đề xuất mới: Phân loại Task (Feature vs Bug) -->
                            <div class="mt-4 p-3 bg-slate-50/80 rounded-xl border border-slate-200">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2">Loại công việc hoàn thành</label>
                                <div class="flex flex-wrap gap-4">
                                    <label class="flex items-center cursor-pointer group">
                                        <input type="radio" name="taskType-${task.id}" value="feature" ${details.taskType === 'feature' ? 'checked' : ''} onchange="updateDetail('${task.id}', 'taskType', this.value)" class="w-4 h-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
                                        <span class="ml-2 text-sm font-semibold text-slate-600 group-hover:text-indigo-600 transition-colors flex items-center">
                                            <span class="text-indigo-500 mr-1.5">✨</span> Code Tính năng mới (Feature)
                                        </span>
                                    </label>
                                    <label class="flex items-center cursor-pointer group">
                                        <input type="radio" name="taskType-${task.id}" value="bug" ${details.taskType === 'bug' ? 'checked' : ''} onchange="updateDetail('${task.id}', 'taskType', this.value)" class="w-4 h-4 text-red-500 border-slate-300 focus:ring-red-500">
                                        <span class="ml-2 text-sm font-semibold text-slate-600 group-hover:text-red-500 transition-colors flex items-center">
                                            <span class="text-red-500 mr-1.5">🐛</span> Fix lỗi / Nợ kỹ thuật (Bug/Tech Debt)
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Dropdown Info cho Đang Làm -->
                        <div class="expand-transition overflow-hidden bg-white border-t border-slate-100 ${isDoing ? 'max-h-40 opacity-100 p-4' : 'max-h-0 opacity-0 p-0 border-transparent'}">
                            <label class="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                <span>Cập nhật % Tiến độ hiện tại:</span>
                                <span id="prog-val-${task.id}" class="text-blue-600 text-sm">${details.progress || 50}%</span>
                            </label>
                            <input type="range" min="0" max="95" step="5" value="${details.progress || 50}" 
                                class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                oninput="updateDetail('${task.id}', 'progress', this.value)">
                            <p class="text-[11px] text-slate-400 mt-2 italic">* Nếu đã xong 100%, vui lòng chọn trạng thái "Đã Xong".</p>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <!-- Header (Màu Indigo đặc trưng Tech) -->
                <div class="bg-indigo-900 rounded-2xl shadow-lg p-6 text-white flex justify-between items-center flex-wrap gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="h-12 w-12 bg-white text-indigo-900 rounded-full flex items-center justify-center font-black text-xl">${currentUser.avatar}</div>
                        <div>
                            <h1 class="text-2xl font-black flex items-center"><i data-lucide="code-2" class="mr-2"></i> TECH DAILY SYNC</h1>
                            <p class="text-indigo-200 text-sm font-medium">Xin chào ${currentUser.name} (${currentUser.role})</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center bg-indigo-800/60 p-2.5 rounded-xl border border-indigo-700/50 hover:bg-indigo-800 transition-colors">
                        <i data-lucide="calendar-clock" class="w-5 h-5 text-indigo-300 mr-3"></i>
                        <div class="flex flex-col">
                            <label class="text-[10px] text-indigo-300 font-bold uppercase tracking-wider leading-none mb-1.5">Ngày báo cáo</label>
                            <input type="date" value="${formData.reportDate}" onchange="formData.reportDate = this.value; renderApp()" class="bg-transparent text-white text-sm font-bold focus:outline-none cursor-pointer [color-scheme:dark] p-0 border-0 leading-none">
                        </div>
                    </div>
                </div>

                <!-- P1: Hôm qua -->
                <div class="mt-6">
                    <h2 class="text-lg font-black text-slate-800 mb-3 flex items-center"><i data-lucide="history" class="mr-2 text-indigo-500"></i>1. Review công việc hôm qua</h2>
                    ${yesterdayTasksHtml}
                </div>

                <!-- P2: Blockers -->
                <div class="mt-6 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-black text-slate-800 flex items-center">
                            <i data-lucide="alert-octagon" class="mr-2 text-red-500 w-5 h-5"></i>
                            2. Khó khăn & Rủi ro trễ Deadline
                        </h2>
                        <button onclick="addBlocker()" class="text-sm font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Thêm Vấn đề
                        </button>
                    </div>

                    ${formData.blockers.length === 0 ? `
                        <div class="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-xl">
                            <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-100 text-emerald-500 rounded-full mb-3">
                                <i data-lucide="check-check" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-bold text-slate-600">Mọi việc đều suôn sẻ!</p>
                            <p class="text-xs text-slate-400 mt-1">Hệ thống hoạt động tốt, không có rào cản.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            ${formData.blockers.map((blocker, index) => `
                                <div class="p-4 border border-red-100 bg-red-50/40 rounded-xl relative group">
                                    <button onclick="removeBlocker('${blocker.id}')" class="absolute top-3 right-3 text-red-300 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100" title="Xóa rào cản này">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                    
                                    <div class="mb-4 pr-8">
                                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Công việc / Bug đang gặp vấn đề</label>
                                        <div class="relative">
                                            <input list="assigned-tasks" value="${blocker.task}" onchange="updateBlocker('${blocker.id}', 'task', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none font-semibold text-slate-700 bg-white" placeholder="Chọn task đang bị kẹt...">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="md:col-span-2">
                                            <div class="flex justify-between items-end mb-1.5">
                                                <label class="block text-[11px] font-bold text-slate-500 uppercase">Mô tả chi tiết khó khăn</label>
                                                <div class="flex gap-1.5 flex-wrap justify-end">
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Chờ API từ BE]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chờ API</button>
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Chờ Design UI]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Chờ Design</button>
                                                    <button onclick="appendBlockerTag('${blocker.id}', '[Lỗi Môi trường/Server]')" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 px-1.5 py-0.5 rounded font-medium text-slate-600">Lỗi Server</button>
                                                </div>
                                            </div>
                                            <textarea onchange="updateBlocker('${blocker.id}', 'desc', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none min-h-[60px] bg-white placeholder-slate-400" placeholder="Mô tả chi tiết...">${blocker.desc}</textarea>
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Mức độ nguy cơ</label>
                                            <select onchange="updateBlocker('${blocker.id}', 'impact', this.value)" class="w-full text-sm p-2.5 rounded-lg border border-red-200 focus:border-red-400 focus:ring-1 focus:ring-red-400 outline-none bg-white font-semibold ${blocker.impact === 'high' ? 'text-red-600' : 'text-slate-700'}">
                                                <option value="none" ${blocker.impact === 'none' ? 'selected' : ''}>🟢 Vẫn kiểm soát được tiến độ</option>
                                                <option value="low" ${blocker.impact === 'low' ? 'selected' : ''}>🟡 Chậm 0.5 - 1 ngày</option>
                                                <option value="high" ${blocker.impact === 'high' ? 'selected' : ''}>🔴 Nguy cơ trễ Deadline Sprint</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>

                <!-- P3: Hôm nay (CẬP NHẬT CỜ P0) -->
                <div class="mt-6 bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-black text-slate-800 flex items-center">
                            <i data-lucide="target" class="mr-2 text-amber-500 w-5 h-5"></i>
                            3. Mục tiêu Focus hôm nay
                        </h2>
                        <button onclick="addTodayPlan()" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Thêm Công việc
                        </button>
                    </div>

                    ${formData.todayPlans.length === 0 ? `
                        <div class="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-xl">
                            <div class="inline-flex items-center justify-center w-12 h-12 bg-amber-100 text-amber-500 rounded-full mb-3">
                                <i data-lucide="target" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-bold text-slate-600">Chưa có mục tiêu nào!</p>
                            <p class="text-xs text-slate-400 mt-1">Hãy thêm công việc bạn dự định focus trong hôm nay.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            ${formData.todayPlans.map((plan, index) => `
                                <div class="p-4 rounded-xl relative group transition-all ${plan.isP0 ? 'border-2 border-red-300 bg-red-50/30 shadow-md' : 'border border-slate-200 bg-slate-50/50'}">
                                    <button onclick="removeTodayPlan('${plan.id}')" class="absolute top-3 right-3 text-slate-400 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm opacity-0 group-hover:opacity-100 z-10" title="Xóa công việc này">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                    
                                    <div class="mb-4 pr-8">
                                        <div class="flex justify-between items-end mb-1.5">
                                            <label class="block text-[11px] font-bold ${plan.isP0 ? 'text-red-600' : 'text-slate-500'} uppercase">Mục tiêu Code #${index + 1}</label>
                                            
                                            <!-- Đề xuất mới: Nút Cờ P0 (Bug khẩn cấp) -->
                                            <button onclick="toggleP0Plan('${plan.id}')" class="flex items-center px-2 py-1 rounded text-[10px] font-bold border transition-colors ${plan.isP0 ? 'bg-red-50 border-red-200 text-red-600 shadow-sm' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}">
                                                <i data-lucide="bug" class="w-3 h-3 mr-1 ${plan.isP0 ? 'text-red-500' : ''}"></i> Bug Khẩn cấp (P0 / Hot Fix)
                                            </button>
                                        </div>
                                        <div class="relative">
                                            <input list="assigned-tasks" value="${plan.task}" onchange="updateTodayPlan('${plan.id}', 'task', this.value)" class="w-full text-sm p-2.5 rounded-lg border ${plan.isP0 ? 'border-red-200 focus:border-red-500 focus:ring-red-500' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-500'} focus:ring-1 outline-none font-semibold text-slate-700 bg-white" placeholder="Chọn Task / Bug cần xử lý...">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div class="md:col-span-3">
                                            <label class="block text-[11px] font-bold ${plan.isP0 ? 'text-red-500' : 'text-slate-500'} uppercase mb-1.5">Cam kết đầu ra</label>
                                            <input type="text" onchange="updateTodayPlan('${plan.id}', 'output', this.value)" class="w-full text-sm p-2.5 rounded-lg border ${plan.isP0 ? 'border-red-200 focus:border-red-500 focus:ring-red-500' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-500'} focus:ring-1 outline-none bg-white placeholder-slate-400" placeholder="Kết quả sẽ đạt được (Xong API, Fix được lỗi...)" value="${plan.output}">
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-bold ${plan.isP0 ? 'text-red-500' : 'text-slate-500'} uppercase mb-1.5">Dự kiến tiến độ</label>
                                            <div class="relative flex items-center">
                                                <span class="absolute left-3 text-slate-400 font-bold">+</span>
                                                <input type="number" onchange="updateTodayPlan('${plan.id}', 'progress', this.value)" class="w-full text-sm p-2.5 pl-7 pr-8 rounded-lg border ${plan.isP0 ? 'border-red-200 focus:border-red-500 focus:ring-red-500 text-red-600' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-500 text-indigo-600'} focus:ring-1 outline-none bg-white font-bold" placeholder="0" value="${plan.progress}">
                                                <span class="absolute right-3 text-slate-400 font-bold">%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}

                    <datalist id="assigned-tasks">
                        ${assignedTasks.map(t => `<option value="${t.id} - ${t.title}"></option>`).join('')}
                    </datalist>
                </div>

                <button class="w-full mt-6 py-3.5 rounded-xl font-black text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg flex justify-center items-center transition-all hover:scale-[1.01] active:scale-[0.98]" onclick="alert('Đã nộp báo cáo cho ngày: ' + formData.reportDate)">
                    <i data-lucide="send" class="w-5 h-5 mr-2"></i> Gửi Báo Cáo Daily
                </button>
            `;
            lucide.createIcons();
        }

        renderApp();
    </script>
</body>
</html>
